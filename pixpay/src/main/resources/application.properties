spring.application.name=pixpay

server.port=8080

comunication.external-api.authorizer-url=https://util.devi.tools/api/v2/authorize
comunication.external-api.notify-transfer-url=https://util.devi.tools/api/v1/notify

jwt.private.key=classpath:app.key
jwt.public.key=classpath:app.pub

spring.datasource.url=jdbc:postgresql://localhost:5432/pixpay_production
spring.datasource.username=dev_user
spring.datasource.password=dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.kafka.bootstrap-servers=localhost:9092

app.redis.sentinel.master=mymaster
app.redis.sentinel.nodes=127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381
app.redis.sentinel.timeout-seconds=2
app.redis.sentinel.ttl-minutes=30