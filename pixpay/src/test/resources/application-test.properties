spring.config.import=classpath:application.properties

server.port=8079
jwt.private.key=classpath:test.key
jwt.public.key=classpath:test.pub

spring.datasource.url=${spring.datasource.url}
spring.datasource.username=${spring.datasource.username}
spring.datasource.password=${spring.datasource.password}

spring.kafka.bootstrap-servers=${spring.kafka.bootstrap-servers}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.redis.sentinel.password=
app.redis.sentinel.master=${app.redis.sentinel.master}
app.redis.sentinel.nodes=${app.redis.sentinel.nodes}