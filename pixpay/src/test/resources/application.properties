spring.application.name=pixpay
server.port=8079
jwt.private.key=classpath:test.key
jwt.public.key=classpath:test.pub
spring.datasource.url=jdbc:postgresql://localhost:5432/pixpay_test
spring.datasource.username=dev_user
spring.datasource.password=dev_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.jpa.properties.hibernate.javax.persistence.schema-generation.create-database-schemas=true

